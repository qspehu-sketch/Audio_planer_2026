<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petal Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#F5E6EA;
  --bg-deep:#ead5dc;
  --rose:#E8C7D0;
  --rose-muted:#CFA5B4;
  --lavender:#BFA2DB;
  --lavender-deep:#a88cc9;
  --cream:#FFFBFA;
  --cream-soft:#FFF5F7;
  --white:#FFFFFF;
  --glass:rgba(255,255,255,.62);
  --glass-strong:rgba(255,255,255,.82);
  --stroke:rgba(255,255,255,.85);
  --stroke-soft:rgba(207,165,180,.35);
  --text:#3a2e38;
  --text2:#6b5a65;
  --text3:#9a8794;
  --blush:rgba(232,199,208,.45);
  --blush2:rgba(191,162,219,.2);
  --glow-rose:rgba(232,199,208,.55);
  --glow-lav:rgba(191,162,219,.45);
  --shadow-sm:0 4px 24px rgba(58,46,56,.06);
  --shadow-md:0 12px 40px rgba(58,46,56,.1);
  --shadow-glow:0 8px 32px rgba(191,162,219,.25),0 0 0 1px rgba(255,255,255,.6) inset;
  --radius-sm:16px;
  --radius:24px;
  --radius-lg:28px;
  --radius-xl:32px;
  --ease-out:cubic-bezier(.22,1,.36,1);
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
  --border:rgba(207,165,180,.28);
  --border2:rgba(191,162,219,.22);
  --high:#c76b7e;
  --med:#b8926a;
  --low:#7a9eb0;
  --success:#7eb89a;
  --rose2:var(--rose-muted);
  --rose3:#b88a9a;
  --petal:var(--cream-soft);
}

html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}

body{
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  line-height:1.5;
  position:relative;
  overflow-x:hidden;
}
body::before,body::after{
  content:'';
  position:fixed;
  border-radius:50%;
  filter:blur(80px);
  opacity:.55;
  pointer-events:none;
  z-index:0;
}
body::before{
  width:min(72vw,520px);
  height:min(72vw,520px);
  background:radial-gradient(circle,rgba(232,199,208,.9) 0%,rgba(245,230,234,.3) 55%,transparent 70%);
  top:-12%;
  left:-18%;
  animation:orbDrift 22s ease-in-out infinite;
}
body::after{
  width:min(65vw,480px);
  height:min(65vw,480px);
  background:radial-gradient(circle,rgba(191,162,219,.75) 0%,rgba(245,230,234,.25) 60%,transparent 72%);
  bottom:-8%;
  right:-14%;
  animation:orbDrift 26s ease-in-out infinite reverse;
}
@keyframes orbDrift{
  0%,100%{transform:translate(0,0) scale(1);}
  50%{transform:translate(2%,3%) scale(1.06);}
}

/* ── NAV ── */
.nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:1rem 1.75rem;
  background:var(--glass);
  backdrop-filter:blur(24px) saturate(1.35);
  -webkit-backdrop-filter:blur(24px) saturate(1.35);
  border-bottom:1px solid var(--stroke-soft);
  position:sticky;
  top:0;
  z-index:100;
  flex-wrap:wrap;
  gap:.85rem;
  box-shadow:var(--shadow-sm);
}
.nav-brand{
  font-family:'Playfair Display',Georgia,serif;
  font-size:1.25rem;
  font-weight:500;
  letter-spacing:.02em;
  background:linear-gradient(135deg,#9a7a88 0%,var(--rose-muted) 45%,var(--lavender-deep) 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  filter:drop-shadow(0 2px 12px rgba(191,162,219,.35));
}
.nav-tabs{
  display:flex;
  background:rgba(255,255,255,.5);
  border-radius:999px;
  padding:4px;
  gap:3px;
  border:1px solid var(--stroke);
  box-shadow:0 2px 16px rgba(58,46,56,.05);
}
.nav-tab{
  padding:10px 22px;
  border-radius:999px;
  border:none;
  background:transparent;
  font-family:inherit;
  font-size:13px;
  font-weight:600;
  color:var(--text3);
  cursor:pointer;
  transition:transform .25s var(--ease-out),box-shadow .25s,color .2s,background .2s;
}
.nav-tab:hover{color:var(--text2);transform:translateY(-1px);}
.nav-tab:active{transform:scale(.97) translateY(0);}
.nav-tab.active{
  background:var(--white);
  color:#8a6a78;
  box-shadow:0 4px 20px rgba(191,162,219,.22),0 0 0 1px rgba(255,255,255,.9) inset;
}

.page{display:none;animation:pageIn .45s var(--ease-out) both;}
.page.active{display:block;}
@keyframes pageIn{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:none;}
}

/* ═══ VOICE ═══ */
.vpage{
  max-width:680px;
  margin:0 auto;
  padding:2.75rem 1.5rem 5.5rem;
  position:relative;
  z-index:1;
}
.vhero{
  text-align:center;
  margin-bottom:2.25rem;
  position:relative;
}
.vhero-sparkle{
  display:block;
  font-size:1.1rem;
  color:var(--lavender);
  opacity:.75;
  margin-bottom:.5rem;
  animation:sparkle 3s ease-in-out infinite;
  letter-spacing:.2em;
}
@keyframes sparkle{
  0%,100%{opacity:.45;transform:translateY(0);}
  50%{opacity:1;transform:translateY(-3px);}
}
.vhero h2{
  font-family:'Playfair Display',Georgia,serif;
  font-size:clamp(1.65rem,4.5vw,2rem);
  font-weight:500;
  color:var(--text);
  margin-bottom:.5rem;
  letter-spacing:.01em;
  line-height:1.2;
}
.vhero h2::after{
  content:'';
  display:block;
  width:48px;
  height:3px;
  margin:.85rem auto 0;
  border-radius:99px;
  background:linear-gradient(90deg,var(--rose),var(--lavender));
  opacity:.65;
}
.vhero p{
  font-size:14px;
  font-weight:400;
  color:var(--text3);
  line-height:1.75;
  max-width:28em;
  margin:0 auto;
  animation:textFade .8s var(--ease-out) .15s both;
}
@keyframes textFade{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:none;}
}

.mic-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:1.35rem;
  margin-bottom:2.25rem;
}
.mic-float{
  animation:micBreath 5s ease-in-out infinite;
  position:relative;
  filter:drop-shadow(0 16px 40px rgba(191,162,219,.35));
}
@keyframes micBreath{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}
.mic-btn{
  width:112px;
  height:112px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  background:linear-gradient(145deg,#fff5f7 0%,var(--rose) 38%,var(--lavender) 92%);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  transition:transform .35s var(--ease-spring),box-shadow .35s;
  box-shadow:
    0 8px 32px rgba(232,199,208,.5),
    0 0 0 1px rgba(255,255,255,.65) inset,
    0 -4px 20px rgba(191,162,219,.15) inset;
}
.mic-btn:hover{
  transform:scale(1.08);
  box-shadow:
    0 12px 48px rgba(191,162,219,.45),
    0 0 60px rgba(232,199,208,.55),
    0 0 0 1px rgba(255,255,255,.8) inset;
}
.mic-btn:active{
  transform:scale(.96);
  box-shadow:0 4px 20px rgba(191,162,219,.3),0 0 0 1px rgba(255,255,255,.5) inset;
}
.mic-btn.on{
  animation:micPulse 2s ease-in-out infinite;
  box-shadow:
    0 0 0 0 rgba(232,199,208,.5),
    0 12px 48px rgba(191,162,219,.55),
    0 0 80px rgba(232,199,208,.4);
}
@keyframes micPulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.06);}
}
.mic-btn svg{
  fill:#fff;
  width:36px;
  height:36px;
  filter:drop-shadow(0 2px 8px rgba(58,46,56,.12));
}
.mring{
  position:absolute;
  inset:-14px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,.5);
  box-shadow:0 0 20px rgba(191,162,219,.25);
  pointer-events:none;
}
.mic-btn.on .mring{animation:ringPulse 2s ease-out infinite;}
@keyframes ringPulse{
  0%{transform:scale(1);opacity:.85;}
  100%{transform:scale(1.45);opacity:0;}
}
.mic-hint{
  font-size:13px;
  font-weight:500;
  color:var(--text3);
  text-align:center;
  line-height:1.75;
  max-width:300px;
  animation:textFade 1s var(--ease-out) .2s both;
}

.tbox{
  background:var(--glass-strong);
  backdrop-filter:blur(20px) saturate(1.2);
  -webkit-backdrop-filter:blur(20px) saturate(1.2);
  border:1px solid var(--stroke);
  border-radius:var(--radius);
  padding:1.1rem 1.35rem;
  display:flex;
  align-items:center;
  gap:12px;
  min-height:58px;
  margin-bottom:2rem;
  transition:border-color .35s,box-shadow .35s,transform .3s var(--ease-out);
  box-shadow:var(--shadow-sm);
}
.tbox:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.tbox.active{
  border-color:rgba(191,162,219,.5);
  box-shadow:0 0 0 3px rgba(191,162,219,.12),var(--shadow-md);
}
.tdot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:linear-gradient(180deg,var(--border2),var(--border));
  flex-shrink:0;
  transition:transform .3s,box-shadow .3s;
  box-shadow:0 2px 8px rgba(58,46,56,.08);
}
.tdot.on{
  background:linear-gradient(135deg,var(--rose),var(--lavender));
  animation:dotPulse .9s ease infinite;
  box-shadow:0 0 12px rgba(232,199,208,.8);
}
@keyframes dotPulse{
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:.75;transform:scale(.88);}
}
.ttext{
  font-size:14px;
  font-weight:450;
  color:var(--text3);
  font-style:italic;
  flex:1;
  transition:color .3s,font-style .3s;
}
.ttext.filled{
  color:var(--text);
  font-style:normal;
  animation:textReveal .55s var(--ease-out) both;
}
.tbox.active .ttext.filled{animation:textReveal .55s var(--ease-out) both;}
@keyframes textReveal{
  from{opacity:0;transform:translateX(-8px);}
  to{opacity:1;transform:none;}
}

.slabel{
  font-family:'Playfair Display',Georgia,serif;
  font-size:1.2rem;
  font-weight:500;
  color:var(--text);
  margin-bottom:1rem;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.slabel span{
  font-family:inherit;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:12px;
  font-weight:600;
  color:var(--text3);
  letter-spacing:.04em;
  text-transform:uppercase;
}
.frow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.35rem;}
.fbtn{
  padding:8px 18px;
  border-radius:999px;
  border:1px solid var(--stroke-soft);
  background:var(--glass-strong);
  backdrop-filter:blur(12px);
  font-family:inherit;
  font-size:12px;
  font-weight:600;
  color:var(--text3);
  cursor:pointer;
  transition:transform .25s var(--ease-out),box-shadow .25s,border-color .2s,color .2s,background .2s;
  box-shadow:0 2px 12px rgba(58,46,56,.04);
}
.fbtn:hover{
  color:var(--text2);
  border-color:rgba(191,162,219,.4);
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(191,162,219,.12);
}
.fbtn:active{transform:scale(.97) translateY(0);}
.fbtn.active{
  background:linear-gradient(135deg,rgba(255,255,255,.95),rgba(232,199,208,.35));
  color:#7a5a68;
  border-color:rgba(191,162,219,.45);
  box-shadow:0 4px 24px rgba(191,162,219,.2),0 0 0 1px rgba(255,255,255,.8) inset;
}

/* daily reminder glass + custom checkbox */
.drem{
  background:var(--glass-strong);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--stroke);
  border-radius:var(--radius);
  padding:1.1rem 1.25rem;
  margin-bottom:1.35rem;
  box-shadow:var(--shadow-sm);
  transition:box-shadow .3s,transform .3s var(--ease-out);
}
.drem:hover{box-shadow:var(--shadow-md);}
.drem-row{
  display:flex;
  align-items:center;
  gap:12px;
  margin-top:.75rem;
  padding-top:.85rem;
  border-top:1px solid var(--border);
}
.drem-hint{font-size:12px;font-weight:600;color:var(--text3);letter-spacing:.03em;text-transform:uppercase;}
.drem-sel{
  font-family:inherit;
  font-size:13px;
  font-weight:500;
  padding:8px 16px;
  border-radius:var(--radius-sm);
  border:1px solid var(--stroke-soft);
  background:rgba(255,255,255,.85);
  color:var(--text);
  cursor:pointer;
  transition:box-shadow .25s,border-color .2s;
}
.drem-sel:focus{outline:none;border-color:var(--lavender);box-shadow:0 0 0 3px rgba(191,162,219,.2);}

.pp-check{
  display:flex;
  align-items:flex-start;
  gap:14px;
  cursor:pointer;
  user-select:none;
}
.pp-check-input{
  position:absolute;
  opacity:0;
  width:0;
  height:0;
  pointer-events:none;
}
.pp-check-ui{
  flex-shrink:0;
  width:26px;
  height:26px;
  border-radius:10px;
  border:2px solid var(--stroke-soft);
  background:rgba(255,255,255,.75);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:transform .3s var(--ease-spring),border-color .25s,box-shadow .25s,background .25s;
  box-shadow:0 2px 10px rgba(58,46,56,.06);
}
.pp-check-icon{
  width:15px;
  height:15px;
  color:#fff;
}
.pp-check-icon path{
  stroke-dasharray:24;
  stroke-dashoffset:24;
  transition:stroke-dashoffset .5s var(--ease-out);
}
.pp-check-input:checked + .pp-check-ui{
  background:linear-gradient(135deg,var(--rose),var(--lavender));
  border-color:transparent;
  box-shadow:0 4px 16px rgba(191,162,219,.4);
  transform:scale(1.02);
}
.pp-check-input:checked + .pp-check-ui .pp-check-icon path{
  stroke-dashoffset:0;
}
.pp-check-input:focus-visible + .pp-check-ui{
  box-shadow:0 0 0 3px rgba(191,162,219,.35);
}
.pp-check-label{
  font-size:13px;
  font-weight:600;
  color:var(--text2);
  line-height:1.5;
  padding-top:2px;
}

.tlist{display:flex;flex-direction:column;gap:14px;}

.tcard{
  background:var(--glass-strong);
  backdrop-filter:blur(16px) saturate(1.15);
  -webkit-backdrop-filter:blur(16px) saturate(1.15);
  border:1px solid var(--stroke);
  border-radius:var(--radius-lg);
  padding:1.15rem 1.25rem 1.15rem 1.1rem;
  display:flex;
  align-items:flex-start;
  gap:14px;
  position:relative;
  overflow:hidden;
  box-shadow:var(--shadow-sm);
  transition:transform .4s var(--ease-out),box-shadow .4s,border-color .3s;
  animation:cardEnter .55s var(--ease-out) both;
}
.tcard::before{
  content:'';
  position:absolute;
  left:0;
  top:12px;
  bottom:12px;
  width:4px;
  border-radius:0 6px 6px 0;
  background:linear-gradient(180deg,var(--border),var(--border2));
  opacity:.9;
}
.tcard:hover{
  transform:translateY(-5px) scale(1.01);
  box-shadow:0 20px 48px rgba(58,46,56,.1),0 0 40px rgba(191,162,219,.12);
  border-color:rgba(255,255,255,.95);
}
.tcard.ph::before{background:linear-gradient(180deg,var(--high),#e8a0ad);}
.tcard.pm::before{background:linear-gradient(180deg,var(--med),#d4b896);}
.tcard.pl::before{background:linear-gradient(180deg,var(--low),#9bb8c8);}
.tcard.dn{opacity:.5;filter:saturate(.85);}
@keyframes cardEnter{
  from{opacity:0;transform:translateY(16px) scale(.98);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

.tbody{flex:1;min-width:0;}
.ttitle{
  font-size:15px;
  font-weight:600;
  color:var(--text);
  margin-bottom:6px;
  line-height:1.45;
  letter-spacing:-.01em;
}
.ttitle.struck{text-decoration:line-through;color:var(--text3);font-weight:500;}
.tmeta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.badge{
  font-size:10px;
  font-weight:700;
  letter-spacing:.04em;
  text-transform:uppercase;
  padding:4px 11px;
  border-radius:999px;
}
.bh{background:rgba(199,107,126,.14);color:var(--high);}
.bm{background:rgba(184,146,106,.16);color:#8b7355;}
.bl{background:rgba(122,158,176,.14);color:var(--low);}
.ttime{font-size:11px;font-weight:500;color:var(--text3);}
.tacts{display:flex;gap:8px;align-items:center;}

.ibtn{
  position:relative;
  width:36px;
  height:36px;
  border-radius:12px;
  border:1px solid var(--stroke-soft);
  background:rgba(255,255,255,.85);
  cursor:pointer;
  font-size:14px;
  font-weight:600;
  color:var(--lavender-deep);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:transform .25s var(--ease-spring),box-shadow .25s,border-color .2s,background .2s,color .2s;
  box-shadow:0 2px 10px rgba(58,46,56,.06);
}
.ibtn:not(.del):hover{
  background:linear-gradient(135deg,rgba(232,199,208,.35),rgba(191,162,219,.25));
  color:#6a5080;
  border-color:rgba(191,162,219,.4);
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(191,162,219,.2);
}
.ibtn:not(.del):active{
  transform:scale(.92);
}
.ibtn.del{color:var(--text3);}
.ibtn.del:hover{
  background:rgba(199,107,126,.1);
  color:var(--high);
  border-color:rgba(199,107,126,.35);
  transform:translateY(-2px);
}
.ibtn.del:active{transform:scale(.92);}

.empty{
  text-align:center;
  padding:3.5rem 1.5rem 3rem;
  background:var(--glass-strong);
  backdrop-filter:blur(20px);
  border:1px solid var(--stroke);
  border-radius:var(--radius-xl);
  box-shadow:var(--shadow-sm);
  animation:cardEnter .7s var(--ease-out) both;
}
.empty .fl{
  font-size:3rem;
  line-height:1;
  margin-bottom:1rem;
  display:inline-block;
  animation:petalFloat 4s ease-in-out infinite;
  filter:drop-shadow(0 8px 20px rgba(191,162,219,.3));
}
@keyframes petalFloat{
  0%,100%{transform:translateY(0) rotate(-4deg);}
  50%{transform:translateY(-8px) rotate(4deg);}
}
.empty p{
  font-size:14px;
  font-weight:500;
  color:var(--text3);
  line-height:1.8;
  max-width:22em;
  margin:0 auto;
}
.empty .empty-sub{
  display:block;
  margin-top:.65rem;
  font-size:12px;
  font-weight:500;
  color:var(--text3);
  opacity:.85;
  letter-spacing:.08em;
  text-transform:uppercase;
}

.lcard{
  background:var(--glass-strong);
  backdrop-filter:blur(16px);
  border:1px solid rgba(191,162,219,.35);
  border-radius:var(--radius-lg);
  padding:1.1rem 1.25rem;
  display:flex;
  align-items:center;
  gap:14px;
  animation:cardEnter .45s var(--ease-out) both;
  box-shadow:0 8px 32px rgba(191,162,219,.15);
}
.spin{
  width:22px;
  height:22px;
  border:3px solid rgba(191,162,219,.25);
  border-top-color:var(--lavender);
  border-radius:50%;
  animation:spin .75s linear infinite;
  flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg);}}
.ltxt{font-size:13px;font-weight:500;color:var(--text3);font-style:italic;}

/* ═══ CALENDAR ═══ */
.cpage{
  max-width:980px;
  margin:0 auto;
  padding:1.75rem 1.5rem 5.5rem;
  position:relative;
  z-index:1;
}
.chdr{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:1.75rem;
  flex-wrap:wrap;
  gap:1rem;
}
.ctitle{
  font-family:'Playfair Display',Georgia,serif;
  font-size:clamp(1.35rem,3vw,1.65rem);
  font-weight:500;
  color:var(--text);
  letter-spacing:.02em;
}
.vsw{
  display:flex;
  background:rgba(255,255,255,.55);
  backdrop-filter:blur(12px);
  border-radius:999px;

<script>
/* ── DATA ── */
let tasks=JSON.parse(localStorage.getItem('pp2_tasks')||'[]');
let activeF='all';
let recognition=null,isListening=false;
let reminderTimers={};
let dailyHighLoopTimer=null;
const LS_DAILY_ON='pp2_daily_high_on';
const LS_DAILY_HOUR='pp2_daily_high_hour';
const LS_DAILY_LAST='pp2_daily_high_last';
const MR=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const MG=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const DR=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const DF=['Понедельник','Вторник','Среда','Четверг','Пятница','Суббота','Воскресенье'];
let calView='day',calDate=new Date(),miniM=new Date(new Date().getFullYear(),new Date().getMonth(),1);

function save(){localStorage.setItem('pp2_tasks',JSON.stringify(tasks));}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function dow(d){return(d.getDay()+6)%7;}
function plural(n,a,b,c){const m10=n%10,m100=n%100;if(m10===1&&m100!==11)return a;if(m10>=2&&m10<=4&&(m100<10||m100>=20))return b;return c;}

/* ── TOAST ── */
function toast(msg,ms=3000){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',ms);}

/* ── PAGES ── */
function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  if(id==='calendar')renderCal();
  if(id==='voice')renderTasks();
}

/* ── TASK UTILS ── */
function tasksForDate(y,m,d){
  return tasks.filter(t=>{
    if(!t.datetime)return false;
    const dt=new Date(t.datetime);
    return dt.getFullYear()===y&&dt.getMonth()===m&&dt.getDate()===d;
  });
}
function tasksForHour(y,m,d,h){return tasksForDate(y,m,d).filter(t=>new Date(t.datetime).getHours()===h);}
function tasksNoTime(y,m,d){
  return tasks.filter(t=>{
    if(!t.datetime)return false;
    const dt=new Date(t.datetime);
    return dt.getFullYear()===y&&dt.getMonth()===m&&dt.getDate()===d&&dt.getHours()===0&&dt.getMinutes()===0;
  });
}
function formatDate(iso){
  if(!iso)return'';
  const d=new Date(iso);if(isNaN(d))return iso;
  const now=new Date(),diff=d-now;
  if(diff>0&&diff<86400000)return'сегодня '+d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  if(diff>86400000&&diff<172800000)return'завтра '+d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  return d.getDate()+' '+MG[d.getMonth()]+', '+d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
}

/* ── FILTER ── */
function setF(f,btn){activeF=f;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTasks();}

/* ── RENDER TASKS ── */
function renderTasks(){
  const list=document.getElementById('taskList');
  const cnt=document.getElementById('taskCount');
  let fil=tasks.filter(t=>{
    if(activeF==='done')return t.done;
    if(activeF==='high')return t.priority==='high'&&!t.done;
    if(activeF==='medium')return t.priority==='medium'&&!t.done;
    if(activeF==='low')return t.priority==='low'&&!t.done;
    return!t.done;
  });
  const active=tasks.filter(t=>!t.done).length;
  cnt.textContent=active+' '+plural(active,'задача','задачи','задач');
  if(!fil.length){
    list.innerHTML=`<div class="empty"><div class="fl" aria-hidden="true">🌸</div><p>Здесь пока тихо — идеальный момент, чтобы прислушаться к себе.<br>Нажми на микрофон и скажи, что важно.</p><span class="empty-sub">твой личный ассистент</span></div>`;return;
  }
  list.innerHTML=fil.map(t=>{
    const lbl=t.priority==='high'?'важное':t.priority==='medium'?'среднее':'обычное';
    const pc=t.priority==='high'?'ph':t.priority==='medium'?'pm':'pl';
    const bc=t.priority==='high'?'bh':t.priority==='medium'?'bm':'bl';
    const ts=t.datetime?formatDate(t.datetime):'';
    return`<div class="tcard ${pc}${t.done?' dn':''}">
      <div class="tbody">
        <div class="ttitle${t.done?' struck':''}">${esc(t.title)}</div>
        <div class="tmeta">
          <span class="badge ${bc}">${lbl}</span>
          ${ts?`<span class="ttime">📅 ${ts}</span>`:''}
        </div>
      </div>
      <div class="tacts">
        ${!t.done?`<button class="ibtn" onclick="toggleDone('${t.id}')" title="Выполнено">✓</button>`:''}
        <button class="ibtn del" onclick="delTask('${t.id}')" title="Удалить">✕</button>
      </div>
    </div>`;
  }).join('');
}
function toggleDone(id){const t=tasks.find(x=>x.id===id);if(t){t.done=!t.done;save();renderTasks();renderCal();catchUpDailyHighIfNeeded();}}
function delTask(id){tasks=tasks.filter(x=>x.id!==id);if(reminderTimers[id]){clearTimeout(reminderTimers[id]);delete reminderTimers[id];}save();renderTasks();renderCal();catchUpDailyHighIfNeeded();}

/* ── CALENDAR ── */
function setView(v,btn){calView=v;document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderCal();}
function navCal(dir){
  if(calView==='day')calDate=new Date(calDate.getFullYear(),calDate.getMonth(),calDate.getDate()+dir);
  else if(calView==='week')calDate=new Date(calDate.getFullYear(),calDate.getMonth(),calDate.getDate()+dir*7);
  else if(calView==='month')calDate=new Date(calDate.getFullYear(),calDate.getMonth()+dir,1);
  else if(calView==='year')calDate=new Date(calDate.getFullYear()+dir,0,1);
  renderCal();
}

function renderCal(){
  const body=document.getElementById('calBody');
  const period=document.getElementById('calPeriod');
  const today=new Date();
  if(calView==='day'){
    period.textContent=calDate.getDate()+' '+MG[calDate.getMonth()]+' '+calDate.getFullYear();
    document.getElementById('calTitle').textContent='Ежедневник';
    body.innerHTML=renderDay(calDate,today);
    miniM=new Date(calDate.getFullYear(),calDate.getMonth(),1);
    setTimeout(()=>{renderMiniCal();scrollToNow();},50);
  }else if(calView==='week'){
    const ws=new Date(calDate);ws.setDate(calDate.getDate()-dow(calDate));
    const we=new Date(ws);we.setDate(ws.getDate()+6);
    period.textContent=ws.getDate()+' '+MG[ws.getMonth()]+' — '+we.getDate()+' '+MG[we.getMonth()];
    document.getElementById('calTitle').textContent='Неделя';
    body.innerHTML=renderWeek(ws,today);
  }else if(calView==='month'){
    period.textContent=MR[calDate.getMonth()]+' '+calDate.getFullYear();
    document.getElementById('calTitle').textContent='Месяц';
    body.innerHTML=renderMonth(calDate,today);
  }else{
    period.textContent=calDate.getFullYear();
    document.getElementById('calTitle').textContent='Год';
    body.innerHTML=renderYear(calDate.getFullYear(),today);
  }
}

/* MINI CAL */
function renderMiniCal(){
  const mc=document.getElementById('miniCalGrid');const mct=document.getElementById('miniCalTitle');
  if(!mc)return;
  const today=new Date();
  const y=miniM.getFullYear(),m=miniM.getMonth();
  const fd=(new Date(y,m,1).getDay()+6)%7;
  const dim=new Date(y,m+1,0).getDate();
  const pd=new Date(y,m,0).getDate();
  mct.textContent=MR[m]+' '+y;
  let html='';
  for(let i=fd-1;i>=0;i--)html+=`<div class="mday om">${pd-i}</div>`;
  for(let d=1;d<=dim;d++){
    const it=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    const is=calDate.getFullYear()===y&&calDate.getMonth()===m&&calDate.getDate()===d;
    const ht=tasksForDate(y,m,d).length>0;
    const cls=['mday',it?'today':'',is&&!it?'sel':'',ht&&!it?'ht':''].filter(Boolean).join(' ');
    html+=`<div class="${cls}" onclick="goDay(${y},${m},${d})">${d}</div>`;
  }
  const rem=42-fd-dim;
  for(let d=1;d<=rem&&d<=14;d++)html+=`<div class="mday om">${d}</div>`;
  mc.innerHTML=html;
}
function goDay(y,m,d){calDate=new Date(y,m,d);renderCal();}
function navMini(dir){miniM=new Date(miniM.getFullYear(),miniM.getMonth()+dir,1);renderMiniCal();}

/* DAY VIEW */
function renderDay(date,today){
  const y=date.getFullYear(),m=date.getMonth(),d=date.getDate();
  const isT=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
  const di=dow(date);
  let hours='';
  for(let h=6;h<24;h++){
    const ht=tasksForHour(y,m,d,h);
    const chips=ht.map(t=>`<div class="htask p${t.priority.charAt(0)}" onclick="toast('${esc(t.title)}',4000)">${esc(t.title)}<span style="font-size:9px;opacity:.65">${String(h).padStart(2,'0')}:00</span></div>`).join('');
    hours+=`<div class="hrow" id="hr-${h}"><div class="hlabel">${String(h).padStart(2,'0')}:00</div><div class="hcontent">${chips}</div></div>`;
  }
  const allday=tasksNoTime(y,m,d);
  const tasksinday=allday.length;

  return`<div class="dview">
    <div class="dsidebar">
      <div class="dminical">
        <div class="mchdr">
          <button onclick="navMini(-1)">&#8249;</button>
          <span id="miniCalTitle">${MR[m]} ${y}</span>
          <button onclick="navMini(1)">&#8250;</button>
        </div>
        <div class="mgrid">
          ${DR.map(d=>`<div class="mdow">${d}</div>`).join('')}
          <div id="miniCalGrid" style="display:contents"></div>
        </div>
      </div>
      ${tasksinday?`<div style="background:var(--white);border:1px solid var(--border);border-radius:14px;padding:.9rem 1rem;">
        <div style="font-family:'Playfair Display',serif;font-size:13px;color:var(--rose3);margin-bottom:.6rem;">Задачи дня</div>
        ${allday.map(t=>`<div style="font-size:12px;font-weight:600;color:var(--text2);padding:4px 0;border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center;">
          <span style="width:8px;height:8px;border-radius:50%;background:${t.priority==='high'?'var(--high)':t.priority==='medium'?'var(--med)':'var(--low)'};flex-shrink:0;display:inline-block;"></span>
          ${esc(t.title)}</div>`).join('')}
      </div>`:''}`+
    `</div>
    <div class="dmain">
      <div class="ddatehdr">
        <div class="dnum">${d}</div>
        <div class="dinfo"><div class="dname">${DF[di]}</div><div class="dmonth">${MR[m]} ${y}</div></div>
      </div>
      <div class="hgrid" id="hgrid">
        ${isT?'<div class="ctml" id="ctml"></div>':''}
        ${hours}
      </div>
    </div>
  </div>`;
}

function scrollToNow(){
  const now=new Date();
  const el=document.getElementById('hr-'+now.getHours());
  if(el)el.scrollIntoView({block:'center',behavior:'smooth'});
  const tl=document.getElementById('ctml');
  const hg=document.getElementById('hgrid');
  if(tl&&hg){const off=(now.getHours()-6+now.getMinutes()/60)*52;tl.style.top=Math.max(0,off)+'px';}
}

/* WEEK VIEW */
function renderWeek(ws,today){
  const days=[];for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(ws.getDate()+i);days.push(d);}
  const isTd=d=>d.getFullYear()===today.getFullYear()&&d.getMonth()===today.getMonth()&&d.getDate()===today.getDate();
  const hdrs=days.map(d=>`<div class="wdayhd${isTd(d)?' wtoday':''}"><div class="wdn">${DR[dow(d)]}</div><div class="wnum">${d.getDate()}</div></div>`).join('');
  let tc='',cols=days.map(()=>'');
  for(let h=6;h<24;h++){
    tc+=`<div class="wtslot">${String(h).padStart(2,'0')}:00</div>`;
    days.forEach((d,i)=>{
      const ht=tasksForHour(d.getFullYear(),d.getMonth(),d.getDate(),h);
      const chips=ht.map(t=>`<div class="wchip ${t.priority}" title="${esc(t.title)}">${esc(t.title)}</div>`).join('');
      cols[i]+=`<div class="wcell">${chips}</div>`;
    });
  }
  return`<div class="wgrid">
    <div class="whdr"><div style="border-right:1px solid var(--border)"></div>${hdrs}</div>
    <div class="wbody"><div class="wtcol">${tc}</div>${cols.map(c=>`<div class="wdcol">${c}</div>`).join('')}</div>
  </div>`;
}

/* MONTH VIEW */
function renderMonth(date,today){
  const y=date.getFullYear(),m=date.getMonth();
  const fd=(new Date(y,m,1).getDay()+6)%7;
  const dim=new Date(y,m+1,0).getDate();
  const pd=new Date(y,m,0).getDate();
  const isTd=d=>today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
  let cells='';
  for(let i=fd-1;i>=0;i--)cells+=`<div class="mcell mcom"><div class="mcn">${pd-i}</div></div>`;
  for(let d=1;d<=dim;d++){
    const dt=tasksForDate(y,m,d);
    const numHtml=isTd(d)?`<div class="mcn mcnt">${d}</div>`:`<div class="mcn">${d}</div>`;
    const chips=dt.slice(0,3).map(t=>`<div class="mctask ${t.priority}">${esc(t.title)}</div>`).join('');
    const more=dt.length>3?`<div class="mcmore">+${dt.length-3}</div>`:'';
    cells+=`<div class="mcell${isTd(d)?' mct':''}" onclick="goDay(${y},${m},${d});setView('day',document.querySelector('.vbtn'))">
      ${numHtml}<div class="mctasks">${chips}${more}</div></div>`;
  }
  const rem=Math.ceil((fd+dim)/7)*7-(fd+dim);
  for(let d=1;d<=rem;d++)cells+=`<div class="mcell mcom"><div class="mcn">${d}</div></div>`;
  const dh=DR.map(d=>`<div class="mdowcell">${d}</div>`).join('');
  return`<div class="mwrap"><div class="mdowhdr">${dh}</div><div class="mcells">${cells}</div></div>`;
}

/* YEAR VIEW */
function renderYear(year,today){
  return`<div class="ygrid">${Array.from({length:12},(_,m)=>{
    const y=year,fd=(new Date(y,m,1).getDay()+6)%7,dim=new Date(y,m+1,0).getDate();
    const tc=tasks.filter(t=>{if(!t.datetime)return false;const dt=new Date(t.datetime);return dt.getFullYear()===y&&dt.getMonth()===m;}).length;
    let cells=DR.map(d=>`<div class="ymddow">${d[0]}</div>`).join('');
    for(let i=0;i<fd;i++)cells+=`<div class="ymday ye">0</div>`;
    for(let d=1;d<=dim;d++){
      const it=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
      const ht=tasksForDate(y,m,d).length>0;
      cells+=`<div class="ymday${it?' yt':ht?' yht':''}">${d}</div>`;
    }
    return`<div class="ymcard" onclick="calDate=new Date(${y},${m},1);setView('month',document.querySelectorAll('.vbtn')[2])">
      <div class="ymname">${MR[m]}</div>
      <div class="ymgrid">${cells}</div>
      ${tc?`<div class="ymtc">${tc} ${plural(tc,'задача','задачи','задач')}</div>`:''}
    </div>`;
  }).join('')}</div>`;
}

/* ── SPEECH ── */
function initSpeech(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){document.getElementById('micHint').textContent='Голосовой ввод не поддерживается. Попробуй Chrome.';document.getElementById('micBtn').disabled=true;return;}
  recognition=new SR();recognition.lang='ru-RU';recognition.continuous=false;recognition.interimResults=true;
  recognition.onstart=()=>{isListening=true;document.getElementById('micBtn').classList.add('on');document.getElementById('tDot').classList.add('on');document.getElementById('tText').textContent='Слушаю...';document.getElementById('tText').classList.remove('filled');document.getElementById('tBox').classList.remove('active');document.getElementById('micHint').textContent='Говори — я слушаю! 🌸';};
  recognition.onresult=e=>{let f='',x='';for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)f+=e.results[i][0].transcript;else x+=e.results[i][0].transcript;}document.getElementById('tText').textContent=f||x||'Слушаю...';if(f)document.getElementById('tText').classList.add('filled');};
  recognition.onend=()=>{isListening=false;document.getElementById('micBtn').classList.remove('on');document.getElementById('tDot').classList.remove('on');document.getElementById('micHint').textContent='Нажми на микрофон и расскажи что нужно сделать';const txt=document.getElementById('tText').textContent;if(txt&&txt!=='Слушаю...'&&txt.length>2)handleTranscript(txt);};
  recognition.onerror=e=>{isListening=false;document.getElementById('micBtn').classList.remove('on');document.getElementById('tDot').classList.remove('on');if(e.error==='no-speech')toast('Не услышала, попробуй ещё 🎤');else if(e.error==='not-allowed')toast('Нет доступа к микрофону — разреши в браузере');else toast('Ошибка: '+e.error);};
}
document.getElementById('micBtn').addEventListener('click',()=>{if(!recognition)return;if(isListening)recognition.stop();else recognition.start();});

/* ── CLAUDE ── */
async function handleTranscript(text){
  document.getElementById('tText').textContent=text;
  document.getElementById('tText').classList.add('filled');
  document.getElementById('tBox').classList.add('active');
  const list=document.getElementById('taskList');
  const empty=list.querySelector('.empty');if(empty)empty.remove();
  const ldr=document.createElement('div');ldr.className='lcard';ldr.id='ldr';
  ldr.innerHTML='<div class="spin"></div><div class="ltxt">Разбираю задачу...</div>';
  list.prepend(ldr);
  try{
    const now=new Date();
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:`Ты помощник планировщика. Пользователь сказал на русском: "${text}"
Сегодня ${now.toISOString()}. Год 2026.
Извлеки: title (до 60 симв), priority ("high"=важно/срочно, "medium"=нужно/надо, "low"=можно/хочу), datetime (ISO если упомянуто время/дата, иначе null).
Ответь ТОЛЬКО JSON без markdown: {"title":"...","priority":"...","datetime":"..."}`}]})
    });
    document.getElementById('ldr')?.remove();
    let p={title:text,priority:'medium',datetime:null};
    if(resp.ok){const data=await resp.json();try{p=JSON.parse(data.content[0].text.trim());}catch{}}
    const task={id:Date.now().toString(),title:p.title||text,priority:p.priority||'medium',datetime:p.datetime||null,done:false,created:now.toISOString()};
    tasks.unshift(task);save();scheduleReminder(task);renderTasks();catchUpDailyHighIfNeeded();
    toast('🌸 Добавлено: '+task.title);
    if('Notification'in window&&Notification.permission==='default')Notification.requestPermission();
  }catch(e){
    document.getElementById('ldr')?.remove();
    const task={id:Date.now().toString(),title:text,priority:'medium',datetime:null,done:false,created:new Date().toISOString()};
    tasks.unshift(task);save();renderTasks();catchUpDailyHighIfNeeded();toast('Добавлено без AI разбора');
  }
}

function scheduleReminder(task){
  if(!task.datetime)return;const dt=new Date(task.datetime);if(isNaN(dt))return;
  const diff=dt-Date.now()-5*60*1000;if(diff<0)return;
  if(reminderTimers[task.id])clearTimeout(reminderTimers[task.id]);
  reminderTimers[task.id]=setTimeout(()=>{
    if(Notification.permission==='granted')new Notification('⏰ '+task.title,{body:'Через 5 минут!'});
    else toast('⏰ Скоро: '+task.title,7000);
  },diff);
}

/* ── Ежедневное напоминание о важных ── */
function highTaskCount(){return tasks.filter(t=>t.priority==='high'&&!t.done).length;}
function dailyHighOn(){return localStorage.getItem(LS_DAILY_ON)==='1';}
function dailyHighHourVal(){const h=parseInt(localStorage.getItem(LS_DAILY_HOUR)||'9',10);return isNaN(h)?9:Math.min(23,Math.max(0,h));}
function dateKeyLocal(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function pastDailySlotToday(){
  const now=new Date(),H=dailyHighHourVal();
  const slot=new Date(now.getFullYear(),now.getMonth(),now.getDate(),H,0,0,0);
  return now.getTime()>slot.getTime();
}
function msUntilNextDailySlot(){
  const H=dailyHighHourVal(),now=new Date();
  const next=new Date(now.getFullYear(),now.getMonth(),now.getDate(),H,0,0,0);
  const tN=next.getTime(),tNow=now.getTime();
  if(tN<tNow){next.setDate(next.getDate()+1);return next-now;}
  if(tN===tNow)return 0;
  return tN-tNow;
}
function fireDailyHighReminder(){
  if(!dailyHighOn())return;
  const today=dateKeyLocal(new Date());
  if(localStorage.getItem(LS_DAILY_LAST)===today)return;
  const n=highTaskCount();
  if(n===0)return;
  localStorage.setItem(LS_DAILY_LAST,today);
  const body='У тебя '+n+' '+plural(n,'важная задача','важные задачи','важных задач')+' — загляни в Petal Planner.';
  if('Notification'in window&&Notification.permission==='granted')new Notification('🌹 Важные дела',{body});
  else toast('🌹 '+body,6500);
}
function catchUpDailyHighIfNeeded(){
  if(!dailyHighOn())return;
  if(!pastDailySlotToday())return;
  fireDailyHighReminder();
}
function scheduleDailyHighReminderLoop(){
  if(dailyHighLoopTimer){clearTimeout(dailyHighLoopTimer);dailyHighLoopTimer=null;}
  if(!dailyHighOn())return;
  dailyHighLoopTimer=setTimeout(()=>{
    dailyHighLoopTimer=null;
    fireDailyHighReminder();
    scheduleDailyHighReminderLoop();
  },msUntilNextDailySlot());
}
function initDailyHighReminderUI(){
  const sel=document.getElementById('dailyHighHour');
  const cb=document.getElementById('dailyHighOn');
  if(!sel||!cb)return;
  if(!sel.options.length)for(let h=0;h<24;h++)sel.add(new Option(String(h).padStart(2,'0')+':00',h));
  cb.checked=dailyHighOn();
  sel.value=String(dailyHighHourVal());
  cb.onchange=()=>{
    localStorage.setItem(LS_DAILY_ON,cb.checked?'1':'0');
    if(cb.checked&&'Notification'in window&&Notification.permission==='default')Notification.requestPermission();
    scheduleDailyHighReminderLoop();
    catchUpDailyHighIfNeeded();
  };
  sel.onchange=()=>{
    localStorage.setItem(LS_DAILY_HOUR,sel.value);
    scheduleDailyHighReminderLoop();
    catchUpDailyHighIfNeeded();
  };
}

initSpeech();
initDailyHighReminderUI();
tasks.forEach(scheduleReminder);
renderTasks();
scheduleDailyHighReminderLoop();
catchUpDailyHighIfNeeded();
</script>
